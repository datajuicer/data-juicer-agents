experiment:
  name: "skills_ablation_v0.1"
  model: "qwen3-max-2026-01-23"
  temperature: 0.0
  max_retries: 3
  timeout_seconds: 120

conditions:
  with_skills:
    skills_dir: "skills/"
    inject_skills: true
  without_skills:
    skills_dir: null
    inject_skills: false

eval_files:
  smoke: "eval_cases/v0.1_run_smoke.jsonl"
  baseline: "eval_cases/v0.1_baseline.jsonl"
  hard: "eval_cases/v0.1_hard.jsonl"

output:
  results_dir: "eval_cases/results/"
  plans_dir: "eval_cases/results/plans/"
